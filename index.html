<head>

<!-- Styles critiques (priorité haute) -->
<link rel="stylesheet" href="bills.css" media="print" onload="this.media='all'">
<link rel="stylesheet" href="menu.css" media="print" onload="this.media='all'">

  <link rel="stylesheet" href="bills.css">
  <link rel="stylesheet" href="menu.css">
</noscript>

<style>
:root{
  --bg:#f7f7f7; --fg:#111; --ring:#e5e7eb;
  --surface:#fff; --surface-alt:#fafafa; --surface-inset:#f0f0f0;
  --button-bg:#111; --button-fg:#fff; --legend:#666; --pointer:#111;
  --bubble-bg:#111; --bubble-fg:#fff; --close-bg:rgba(255,255,255,0.12); --close-hover:rgba(255,255,255,0.22);
  --share-bg:#fff; --share-fg:#111; --tooltip-bg:#111; --tooltip-fg:#fff;
  --modal-surface:#fff; --modal-text:#111; --modal-muted:#333;
  --install-surface:#fff; --install-border:rgba(17,17,17,0.12); --install-shadow:0 18px 40px rgba(0,0,0,0.18);
  --install-title:#111; --install-close:#4b5563; --install-close-hover:rgba(17,17,17,0.08);
  --install-button:#c00; --install-button-hover:#900;
  --emoji-size:80px; --bg-size:200vw;
}

:root[data-theme="dark"]{
  --bg:#0f1115; --fg:#f3f4f6; --ring:#2a2f3a;
  --surface:#151922; --surface-alt:#10151d; --surface-inset:#242b38;
  --button-bg:#f3f4f6; --button-fg:#101317; --legend:#a1a1aa; --pointer:#f3f4f6;
  --bubble-bg:#f3f4f6; --bubble-fg:#101317; --close-bg:rgba(0,0,0,0.08); --close-hover:rgba(0,0,0,0.16);
  --share-bg:#101317; --share-fg:#f3f4f6; --tooltip-bg:#f3f4f6; --tooltip-fg:#101317;
  --modal-surface:#151922; --modal-text:#f3f4f6; --modal-muted:#cbd5e1;
  --install-surface:#151922; --install-border:rgba(243,244,246,0.12); --install-shadow:0 18px 40px rgba(0,0,0,0.42);
  --install-title:#f3f4f6; --install-close:#cbd5e1; --install-close-hover:rgba(243,244,246,0.1);
  --install-button:#c00; --install-button-hover:#a30000;
}
  
/* 1️⃣ Tout hérite de la police principale */
*, *::before, *::after {
  font-family: inherit;
}

/* 2️⃣ Police système + lissage */
html,body {
  height: 100%;
  margin: 0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background: var(--bg);
  color: var(--fg);
}

body::before,body::after{
  content:"";position:fixed;z-index:0;width:var(--bg-size);height:var(--bg-size);
  top:calc(50% - var(--bg-size)/2);left:calc(50% - var(--bg-size)/2);
  pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160' viewBox='0 0 160 160'>\
<text x='40' y='40' font-size='50'>☭</text>\
<text x='120' y='120' font-size='50'>☭</text>\
</svg>");
  background-repeat:repeat;background-size:var(--emoji-size) var(--emoji-size);
}
body::after{background-position:calc(var(--emoji-size)/2) calc(var(--emoji-size)/2);}

  
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;
padding-top:clamp(24px,6vh,80px);padding-bottom:24px;box-sizing:border-box;}
.container{width:100%;max-width:720px;padding-inline:12px;display:grid;gap:12px;justify-items:center;}
h1{margin:0;font-size:clamp(18px,2.6vw,22px);font-weight:700;text-transform:uppercase;text-align:center;}
h1 .highlight{background:#c00;color:#fff;padding:4px 10px;border-radius:6px;}
.board{background:var(--surface);border:1px solid var(--ring);border-radius:12px;padding:8px;display:grid;gap:8px;justify-items:center;max-width:560px;box-sizing:border-box;}
.wheel-area{position:relative;width:100%;display:grid;place-items:center;}
.pointer{position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:0;z-index:6;
--w:14px;--h:22px;border-left:var(--w) solid transparent;border-right:var(--w) solid transparent;border-top:var(--h) solid var(--pointer);}
canvas{width:clamp(250px,80vw,540px);aspect-ratio:1/1;display:block;border-radius:50%;background:var(--surface-alt);box-shadow:inset 0 0 0 5px var(--surface-inset);}
.controls{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
button.primary{background:var(--button-bg);color:var(--button-fg);border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;}
.legend{font-size:12px;color:var(--legend);}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);z-index:9999;}
.bubble{position:relative;max-width:92%;padding:20px 48px 20px 20px;border-radius:14px;background:var(--bubble-bg);color:var(--bubble-fg);
box-shadow:0 8px 24px rgba(0,0,0,0.25);font-size:clamp(14px,2.4vw,20px);font-weight:600;text-align:center;line-height:1.35;}
.close{position:absolute;top:10px;right:10px;width:34px;height:34px;border-radius:50%;border:none;background:var(--close-bg);color:var(--bubble-fg);
display:flex;align-items:center;justify-content:center;cursor:pointer;}
.close:hover{background:var(--close-hover);}
.share-bar{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;position:relative;}
.share-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--share-bg);color:var(--share-fg);font-size:18px;cursor:pointer;position:relative;}
.share-btn[title]:hover::after{content:attr(title);position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:var(--tooltip-bg);color:var(--tooltip-fg);padding:4px 8px;border-radius:6px;font-size:12px;white-space:nowrap;}
/* Ajustement du cadre de résultat sur mobile */
@media (max-width: 600px) {
  .overlay {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: 0;
  }
  .bubble {
    max-width: 90%;
    max-width: 340px;
    padding: 16px 36px 16px 16px;
    font-size: 15px;
    border-radius: 16px;
    margin: 0 auto;
    box-sizing: border-box;
  }
}
  /* Empêche l'affichage initial de la fenêtre de résultat */
.overlay[aria-hidden="true"] {
  display: none !important;
}

  /* Boutons de retour utilisateur */
.feedback-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-top: 14px;
}

.feedback-btn {
  background: #c00;
  color: #fff;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 15px;
  text-decoration: none;
  font-weight: 500;
  transition: background 0.2s ease, transform 0.15s ease;
}

.feedback-btn:hover {
  background: #900;
  transform: scale(1.05);
}

.feedback-btn:active {
  transform: scale(0.97);
}

/* Empêche le défilement de la page sur mobile */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: contain; /* bloque l'effet "rebond" sur mobile */
  touch-action: none; /* empêche le scroll tactile */
}

/* Empêche un fond plus grand que l’écran */
body {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
}

#feedbackForm {
  background: var(--modal-surface) !important;
  color: var(--modal-text);
}

#feedbackForm input,
#feedbackForm textarea {
  background: var(--surface-alt);
  color: var(--modal-text);
  border: 1px solid var(--ring);
  border-radius: 8px;
  box-sizing: border-box;
}

#feedbackForm button {
  background: var(--button-bg);
  color: var(--button-fg);
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
}

#feedbackStatus {
  color: var(--modal-muted) !important;
}

.install-banner{
  position:fixed;
  left:50%;
  bottom:calc(16px + env(safe-area-inset-bottom, 0px));
  transform:translate(-50%, calc(100% + 24px));
  width:min(calc(100vw - 24px), 520px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  box-sizing:border-box;
  border:1px solid var(--install-border);
  border-radius:16px;
  background:var(--install-surface);
  box-shadow:var(--install-shadow);
  z-index:9500;
  opacity:0;
  pointer-events:none;
  transition:transform 0.24s ease, opacity 0.24s ease;
}

.install-banner.is-visible{
  transform:translate(-50%, 0);
  opacity:1;
  pointer-events:auto;
}

.install-banner__title{
  color:var(--install-title);
  font-size:15px;
  font-weight:700;
  line-height:1.2;
}

.install-banner__actions{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:0;
}

.install-banner__button{
  border:none;
  border-radius:999px;
  background:var(--install-button);
  color:#fff;
  padding:8px 14px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:background 0.2s ease, transform 0.15s ease;
}

.install-banner__button:hover{
  background:var(--install-button-hover);
}

.install-banner__button:active{
  transform:scale(0.97);
}

.install-banner__close{
  width:32px;
  height:32px;
  display:grid;
  place-items:center;
  border:none;
  border-radius:50%;
  background:transparent;
  color:var(--install-close);
  font-size:18px;
  cursor:pointer;
}

.install-banner__close:hover{
  background:var(--install-close-hover);
}

@media (max-width: 520px) {
  .install-banner{
    gap:10px;
    padding:12px;
  }

  .install-banner__title{
    font-size:14px;
  }

  .install-banner__button{
    padding:8px 12px;
    font-size:13px;
  }
}

</style>
</head>
<body>
<div class="wrap">
  <div class="container">
    <h1><span class="highlight">La roue de la servitude</span></h1>
    <div class="board">
      <div class="wheel-area" id="wheelArea">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="800" height="800"></canvas>
      </div>
      <div class="controls">
        <button id="spinBtn" class="primary">Tourner la roue</button>
        <div class="legend" id="countInfo"></div>
      </div>
    </div>
  </div>
</div>

<div id="installPrompt" class="install-banner" hidden aria-hidden="true">
  <div class="install-banner__title">Installer l'application</div>
  <div class="install-banner__actions">
    <button id="installPromptAction" class="install-banner__button" type="button">Installer</button>
    <button id="installPromptClose" class="install-banner__close" type="button" aria-label="Fermer">✕</button>
  </div>
</div>

<div id="overlay" class="overlay" aria-hidden="true">
  <div class="bubble" role="dialog" aria-modal="true">
    <div id="overlayText"></div>
    <div class="share-bar" id="shareBar">
      <button class="share-btn" data-platform="facebook" title="Partager sur Facebook">📘</button>
      <button class="share-btn" data-platform="x" title="Partager sur X / Twitter">🐦</button>
      <button class="share-btn" data-platform="instagram" title="Partager sur Instagram">📸</button>
      <button class="share-btn" data-platform="linkedin" title="Partager sur LinkedIn">💼</button>
      <button class="share-btn" data-platform="snapchat" title="Partager sur Snapchat">👻</button>
      <button class="share-btn" data-platform="tiktok" title="Partager sur TikTok">🎵</button>
      <button class="share-btn" data-platform="whatsapp" title="Partager sur WhatsApp">💬</button>
      <button class="share-btn" data-platform="telegram" title="Partager sur Telegram">📨</button>
      <button class="share-btn" id="copyText" title="Copier le texte">📋</button>
    </div>
    <button id="overlayClose" class="close" aria-label="Fermer">✕</button>
  </div>
</div>

<!-- Modal feedback (placer dans body) -->
<button id="openFeedbackForm" class="feedback-btn" style="display:none">Donner un complément d'information</button>

<div id="feedbackModal" style="display:none;position:fixed;inset:0;z-index:12000;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);">
  <form id="feedbackForm" style="background:#fff;padding:18px;border-radius:10px;max-width:520px;width:92%;box-sizing:border-box;">
    <h3>Donner un complément d'information</h3>
    <input type="hidden" id="formResult" name="resultText" value="">
    <input type="text" name="honeypot" id="honeypot" style="display:none" autocomplete="off">
    <label style="display:block;margin-top:8px;">
      Votre message
      <textarea id="formMessage" name="userMessage" required style="width:100%;height:120px"></textarea>
    </label>
    <label style="display:block;margin-top:8px;">
      Votre email (optionnel)
      <input id="formEmail" name="userEmail" type="email" style="width:100%">
    </label>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">
      <button type="button" id="closeFeedback">Annuler</button>
      <button type="submit">Envoyer</button>
    </div>
    <div id="feedbackStatus" style="margin-top:10px;font-size:13px;color:#333;display:none;"></div>
  </form>
</div>

<script type="module" src="./js/app.js"></script>


</body>
</html>
